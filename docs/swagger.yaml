basePath: /api/v1
definitions:
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserLoginRequest:
    properties:
      email:
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserRefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserRequest:
    properties:
      email:
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 25
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserSendOTPRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserVerifOTPRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 50
        type: string
    required:
    - code
    - email
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      refresh_token:
        type: string
      role_id:
        type: integer
      token:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  internal_http_handlers_v1.BaseResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Najib Fikri
    url: mailto:najibfikri26@gmail.com
  description: A starting point for building RESTful APIs in Go using the Gin framework,
    sqlx for PostgreSQL, and Redis for caching. Implementation follows Clean Architecture
    principles as described by Uncle Bob.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/snykk/go-rest-boilerplate
  title: Go REST Boilerplate API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns an access token (short TTL) and a refresh token (longer
        TTL). Wrong password and unknown email take the same wall time to prevent
        user enumeration.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens issued
          schema:
            allOf:
            - $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account not yet activated
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
      summary: Authenticate and issue a token pair
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Deletes the refresh-token jti from Redis so /auth/refresh rejects
        it. Access tokens remain valid until their natural expiry — clients should
        discard them on logout.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserRefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "401":
          description: Refresh token invalid
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
      summary: Revoke the refresh token
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Verifies the supplied refresh token, mints a new access+refresh
        pair, and revokes the old jti in Redis. Replaying an already-rotated token
        returns 401.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserRefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New token pair
          schema:
            allOf:
            - $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse'
              type: object
        "401":
          description: Refresh token invalid, expired, or already revoked
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account no longer active
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
      summary: Rotate the refresh token, return a new pair
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a user account in inactive state. The caller must follow
        up with /auth/send-otp + /auth/verify-otp to activate the account before /auth/login
        will succeed.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created
          schema:
            allOf:
            - $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "409":
          description: Email or username already in use
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error (per-field detail in data.errors)
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: Generates a 6-digit OTP, stores it in Redis with a TTL, and enqueues
        the email via the async mailer. The HTTP response returns on enqueue, not
        on actual SMTP delivery.
      parameters:
      - description: Email to send OTP to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserSendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP enqueued
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "400":
          description: Account already activated
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "500":
          description: Failed to enqueue mail
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
      summary: Send an OTP code to the user's email
      tags:
      - auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Validates the supplied code against Redis and flips the user's
        active flag to true on success. Brute-force-guarded — after OTP_MAX_ATTEMPTS
        failures (default 5) the email is locked out for the OTP TTL window even with
        the correct code.
      parameters:
      - description: Email + OTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.UserVerifOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account activated
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "400":
          description: Invalid OTP code
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "403":
          description: Locked out — too many invalid attempts
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
      summary: Verify an OTP code and activate the account
      tags:
      - auth
  /users/me:
    get:
      description: Reads the authenticated user from the JWT in the Authorization
        header and returns the matching record (in-memory cache first, Postgres on
        miss).
      produces:
      - application/json
      responses:
        "200":
          description: User profile
          schema:
            allOf:
            - $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
        "404":
          description: User no longer exists
          schema:
            $ref: '#/definitions/internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Return the current user's profile
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Bearer access token issued by /auth/login or /auth/refresh.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
