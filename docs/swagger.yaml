openapi: 3.0.3
info:
  title: Go Rest Boilerplate
  description: A starting point for building RESTful APIs
  version: 2.0.0
  contact:
    email: najibfikri13@gmail.com
  license:
    name: MIT License
    url: https://github.com/snykk/go-rest-boilerplate/blob/master/LICENSE

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Infrastructure
  - name: Auth
  - name: User

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "0c360f23-d339-499c-a4fe-841daa499aab"
        username:
          type: string
          example: "patrickstar"
        email:
          type: string
          format: email
          example: "patrickstar@gmail.com"
        role_id:
          type: integer
          example: 2
        token:
          type: string
          description: JWT token (only present in login response)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true

paths:
  /health:
    get:
      tags: [Infrastructure]
      summary: Health check
      description: Returns 200 if the service is running
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "service is healthy"

  /ready:
    get:
      tags: [Infrastructure]
      summary: Readiness check
      description: Returns 200 if all dependencies (DB, Redis) are reachable
      responses:
        "200":
          description: All dependencies reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                        example: "ok"
                      redis:
                        type: string
                        example: "ok"
        "503":
          description: One or more dependencies unreachable

  /metrics:
    get:
      tags: [Infrastructure]
      summary: Prometheus metrics
      description: Exposes application metrics in Prometheus format
      responses:
        "200":
          description: Prometheus metrics payload

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  example: "patrickstar"
                email:
                  type: string
                  format: email
                  example: "patrickstar@gmail.com"
                password:
                  type: string
                  minLength: 8
                  example: "secureP@ss1"
      responses:
        "201":
          description: User registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "registration user success"
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in to get a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "login success"
                  data:
                    $ref: "#/components/schemas/UserResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/send-otp:
    post:
      tags: [Auth]
      summary: Send OTP code to user email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: OTP code sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "otp code has been send to user@example.com"
        "404":
          description: Email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP code and activate account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: OTP verification successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "otp verification success"
        "400":
          description: Invalid OTP or already activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/me:
    get:
      tags: [User]
      summary: Get authenticated user info
      description: Retrieve information of the currently authenticated user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User data fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "user data fetched successfully"
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
