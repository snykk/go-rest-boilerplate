name: CI

on:
  push:
    branches: [master, V2]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # ubuntu-latest comes with Docker pre-installed, so testcontainers-go
    # can spin up Postgres and Redis without any extra setup. Pinned go
    # version matches the unit-test job so build cache stays warm.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # The harness uses go.mod (not vendor) for testcontainers-go because
      # the deps are tag-gated; let the action resolve them on demand.
      - name: Run integration tests
        env:
          GOFLAGS: "-mod=mod"
        run: go test -tags=integration -race -timeout=10m ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build binary
        run: go build -o bin/api ./cmd/api/main.go
      - name: Build Docker image
        run: docker build -f deploy/Dockerfile .
